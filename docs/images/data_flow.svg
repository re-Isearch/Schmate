<?xml version="1.0" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
<style>
    .box { fill:#fff7e6; stroke:#5b5b5b; stroke-width:1px; }
    .title { font: bold 12px sans-serif; }
    .text { font: 11px sans-serif; }
    .arrow { stroke:#333; stroke-width:1.2px; marker-end: url(#arrowhead); }
</style>
<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
  </marker>
</defs>

<!-- Nodes -->
<rect x="20" y="20" width="200" height="60" rx="6" class="box"/>
<text x="30" y="40" class="title">User Query</text>
<text x="30" y="60" class="text">"knn what is his language?"</text>

<rect x="260" y="20" width="220" height="60" rx="6" class="box"/>
<text x="270" y="40" class="title">SBertGGML</text>
<text x="270" y="60" class="text">tokenize → encode</text>

<rect x="520" y="20" width="220" height="60" rx="6" class="box"/>
<text x="530" y="40" class="title">HNSW Search</text>
<text x="530" y="60" class="text">searchKnnCloserFirst()</text>

<rect x="260" y="140" width="220" height="60" rx="6" class="box"/>
<text x="270" y="160" class="title">OffsetFile</text>
<text x="270" y="180" class="text">lookup file offsets</text>

<rect x="520" y="140" width="330" height="60" rx="6" class="box"/>
<text x="530" y="160" class="title">Sentences file</text>
<text x="530" y="180" class="text">reconstruct text from bytes</text>

<!-- Arrows -->
<line x1="220" y1="50" x2="260" y2="50" class="arrow" />
<line x1="480" y1="50" x2="520" y2="50" class="arrow" />
<line x1="610" y1="80" x2="610" y2="140" class="arrow" />
<line x1="420" y1="80" x2="420" y2="140" class="arrow" />
<line x1="420" y1="170" x2="520" y2="170" class="arrow" />

</svg>
